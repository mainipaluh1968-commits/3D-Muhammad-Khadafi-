<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    
    <!-- Import komponen model-viewer dari Google -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        /* Menghilangkan margin bawaan browser dan scrollbar */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff; /* Bisa diganti #000000 kalau mau background hitam */
        }

        /* Membuat model 3D memenuhi seluruh layar laptop/HP */
        model-viewer {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Hanya menampilkan model 3D secara full screen -->
    <model-viewer 
        src="speakers_pack.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        tone-mapping="neutral" 
        shadow-intensity="1" 
        auto-rotate>
    </model-viewer>

</body>
</html>
