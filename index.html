<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer - Speakers Pack</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Styling untuk canvas 3D */
        model-viewer {
            width: 100%;
            height: 500px;
            background-color: #e6e6e6;
            border-radius: 8px;
            --poster-color: transparent;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Speakers Pack 3D Viewer</h1>
        <p>Gunakan mouse atau sentuhan untuk memutar dan memperbesar model.</p>
        
        <model-viewer 
            src="speakers_pack.glb" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            camera-controls 
            tone-mapping="neutral" 
            poster="poster.webp" 
            shadow-intensity="1" 
            auto-rotate>
        </model-viewer>
    </div>

</body>
</html>
